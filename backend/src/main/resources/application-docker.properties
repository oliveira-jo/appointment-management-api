
# BACKEND CONTAINER URL
spring.datasource.url=jdbc:postgresql://postgres:5432/appointment_db

spring.datasource.username=${env.DATABASE_USERNAME:postgres}
spring.datasource.password=${env.DATABASE_PASSWORD:password}

# For backend run before Database, avoid conection error
spring.datasource.hikari.initializationFailTimeout=60000
spring.datasource.hikari.connectionTimeout=60000

# JPA Config
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
