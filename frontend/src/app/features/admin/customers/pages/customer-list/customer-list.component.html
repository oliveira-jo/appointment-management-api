<!-- Main Professionals Painel -->
<h2 class="mb-4">Customers</h2>

<div class="d-flex justify-content-between mb-3">
  <div class="d-flex gap-2">
    <input type="text" class="form-control" placeholder="Search by email" [(ngModel)]="searchEmail">
    <button class="btn btn-secondary" (click)="search()"> Search </button>
  </div>

  <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#customerModal">
    New Customer
  </button>
</div>

<table class="table table-striped table-hover">
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Phone</th>
      <th width="150"></th>
    </tr>
  </thead>

  <tbody>
    @for (c of customers; track c.id) {
    <tr>
      <td>{{ c.name }}</td>
      <td>{{ c.email }}</td>
      <td>{{ c.phone }}</td>
      <td>
        <button class="btn btn-sm btn-warning me-2" (click)="change(c.id!)"> Edit </button>
        <button class="btn btn-sm btn-danger" (click)="openDeleteModal(c.id!)"> Delete </button>
      </td>
    </tr>
    }
  </tbody>

</table>


<!-- Modal - Customer -->
<div class="modal fade" id="customerModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title"> {{ editingId ? 'Edit Customer' : 'Create Customer' }} </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal">
        </button>
      </div>

      <div class="modal-body">
        <form #form="ngForm" (ngSubmit)="save(form)">
          <div class="mb-3">
            <label>Name</label>
            <input type="text" class="form-control" name="name" required [(ngModel)]="customer.name">
          </div>

          <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" name="email" required email [(ngModel)]="customer.email">
            <small class="text-danger" *ngIf="form.controls['email']?.invalid && form.controls['email']?.touched">
              Invalid email
            </small>

          </div>

          <div class="mb-3">
            <label>Phone</label>
            <input type="text" class="form-control" name="phone" placeholder="(51) 99999-9999"
              [(ngModel)]="customer.phone" (input)="formatPhone()">
          </div>

          <button class="btn btn-success w-100" [disabled]="form.invalid">
            Save
          </button>
        </form>
      </div>
    </div>
  </div>

</div>

<!-- Modal - Delete -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Delete Customer</h5>
        <button class="btn-close" data-bs-dismiss="modal">
        </button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete this customer?</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal"> Cancel </button>
        <button class="btn btn-danger" (click)="delete()"> Delete </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal - Success -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
  <div id="successToast" class="toast align-items-center text-bg-success border-0">
    <div class="d-flex">
      <div class="toast-body">
        {{toastMessage}}
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast">
      </button>
    </div>
  </div>
</div>
